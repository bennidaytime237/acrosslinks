<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <radialGradient id="circleGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#D4A000"/>
    </radialGradient>
    <!-- Subtle fabric/silk sheen lines -->
    <filter id="silkFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.04" numOctaves="4" seed="5" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="soft-light" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>
  <!-- Silk texture overlay -->
  <rect width="1080" height="1080" fill="url(#bgGrad)" filter="url(#silkFilter)" opacity="0.6"/>

  <!-- Diagonal highlight streaks for fabric look -->
  <line x1="-100" y1="200" x2="600" y2="-100" stroke="#555" stroke-width="120" opacity="0.08"/>
  <line x1="200" y1="900" x2="1100" y2="300" stroke="#555" stroke-width="180" opacity="0.06"/>
  <line x1="-50" y1="700" x2="700" y2="-50" stroke="#666" stroke-width="80" opacity="0.05"/>

  <!-- Gold outer ring -->
  <circle cx="540" cy="500" r="490" fill="none" stroke="#F0B90B" stroke-width="3" opacity="0.85"/>

  <!-- Yellow BNB circle -->
  <circle cx="540" cy="460" r="270" fill="url(#circleGrad)"/>

  <!-- BNB Logo (white) centered in circle -->
  <!-- BNB chain logo path scaled/centered at 540,460 -->
  <g transform="translate(540,460) scale(3.2)">
    <!-- BNB official logo shape -->
    <!-- Diamond center -->
    <polygon points="0,-22 13,-9 0,4 -13,-9" fill="white"/>
    <!-- Top diamond -->
    <polygon points="0,-40 9,-31 0,-22 -9,-31" fill="white"/>
    <!-- Right diamond -->
    <polygon points="22,-18 31,-9 22,0 13,-9" fill="white"/>
    <!-- Bottom diamond -->
    <polygon points="0,4 9,13 0,22 -9,13" fill="white"/>
    <!-- Left diamond -->
    <polygon points="-22,-18 -13,-9 -22,0 -31,-9" fill="white"/>
    <!-- Bottom-left arm -->
    <polygon points="-31,-9 -22,0 -9,13 0,4 -13,-9" fill="white"/>
    <!-- Bottom-right arm -->
    <polygon points="31,-9 22,0 9,13 0,4 13,-9" fill="white"/>
    <!-- Top-left arm -->
    <polygon points="-31,-9 -22,-18 -9,-31 0,-22 -13,-9" fill="white"/>
    <!-- Top-right arm -->
    <polygon points="31,-9 22,-18 9,-31 0,-22 13,-9" fill="white"/>
  </g>

  <!-- "BNB BRIDGING" label -->
  <text x="540" y="880" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="600" fill="white" text-anchor="middle" letter-spacing="6">BNB BRIDGING</text>
</svg>
